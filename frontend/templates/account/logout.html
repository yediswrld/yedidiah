{% extends 'base.html' %}
{% block title %}Sign Out — Yedidiah{% endblock %}
{% block content %}
<section class="form-section">
  <div class="form-container">
    <div class="section-label"><span>See You Soon</span><div class="label-line"></div></div>
    <h1 class="form-heading">Sign <em>Out</em></h1>
    <p class="form-sub">Are you sure you want to sign out?</p>
    <form method="post" class="styled-form">
      {% csrf_token %}
      <button type="submit" class="btn-primary" style="border:none;cursor:pointer;margin-top:10px;">
        <span>Yes, Sign Out</span>
      </button>
    </form>
    <a href="/" class="btn-ghost" style="display:inline-block;margin-top:16px;">Cancel</a>
  </div>
</section>
{% endblock %}
