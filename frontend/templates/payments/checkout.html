{% extends 'base.html' %}
{% block title %}Checkout — Yedidiah{% endblock %}

{% block content %}
<section class="form-section">
  <div class="form-container">
    <div class="section-label">
      <span>Payment</span>
      <div class="label-line"></div>
    </div>
    <h1 class="form-heading">Crypto <em>Checkout</em></h1>
    <p class="form-sub">Pay securely with crypto via NOWPayments. Supports BTC, ETH, USDT and 100+ coins.</p>

    <form method="post" action="/payments/checkout/" class="styled-form">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Amount (USD)</label>
        <input type="number" name="amount" min="1" step="0.01" required class="form-input" placeholder="Enter amount">
      </div>
      <div class="form-group">
        <label class="form-label">Pay With</label>
        <select name="currency" class="form-input">
          <option value="btc">Bitcoin (BTC)</option>
          <option value="eth">Ethereum (ETH)</option>
          <option value="usdttrc20" selected>USDT (TRC20)</option>
          <option value="usdterc20">USDT (ERC20)</option>
          <option value="sol">Solana (SOL)</option>
          <option value="bnb">BNB</option>
        </select>
      </div>
      <button type="submit" class="btn-primary" style="border:none;cursor:pointer;width:100%;margin-top:10px;">
        <span>Proceed to Payment →</span>
      </button>
    </form>
  </div>
</section>
{% endblock %}
